stages:
  - build
  - deploy

variables:
  DOCKER_IMAGE: unidev-toolkit
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - frontend/node_modules

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t $DOCKER_IMAGE .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "master"'

deploy-hf:
  stage: deploy
  image: python:3.11-slim
  script:
    - |
      if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE" ]; then
        echo "HF_TOKEN or HF_SPACE not set — skipping deploy"
        exit 0
      fi
    - pip install --quiet huggingface_hub
    - |
      python - << 'PYEOF'
      import os
      from huggingface_hub import HfApi
      api = HfApi(token=os.environ["HF_TOKEN"])
      api.upload_folder(
          folder_path=".",
          repo_id=os.environ["HF_SPACE"],
          repo_type="space",
          ignore_patterns=[
              ".git", ".gitlab-ci.yml", "node_modules",
              "frontend/node_modules", "__pycache__", "*.pyc",
              "frontend/dist", ".venv", "*.egg-info",
          ],
          commit_message=f"Deploy from GitLab CI — {os.environ.get('CI_COMMIT_SHORT_SHA','')[:8]}",
      )
      print("Deployed to Hugging Face Space:", os.environ["HF_SPACE"])
      PYEOF
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "master"'
