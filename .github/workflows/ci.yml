name: CI / Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Build & test ─────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Verify backend imports
        run: |
          cd backend
          python -c "from app import app; print('Backend OK')"

      - name: Build Docker image
        run: docker build -t unidev-toolkit .

  # ── Deploy to Hugging Face Space ─────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE" ]; then
            echo "::warning::HF_TOKEN or HF_SPACE not set — skipping deploy"
            exit 0
          fi
          pip install --quiet huggingface_hub
          python - << 'PYEOF'
import os
from huggingface_hub import HfApi
api = HfApi(token=os.environ["HF_TOKEN"])
api.upload_folder(
    folder_path=".",
    repo_id=os.environ["HF_SPACE"],
    repo_type="space",
    ignore_patterns=[
        ".git", ".github", "node_modules", "frontend/node_modules",
        "__pycache__", "*.pyc", "frontend/dist",
        ".venv", "*.egg-info",
    ],
    commit_message=f"Deploy from GitHub Actions — {os.environ.get('GITHUB_SHA','')[:8]}",
)
print("✓ Deployed to Hugging Face Space:", os.environ["HF_SPACE"])
PYEOF
