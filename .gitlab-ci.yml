stages:
  - build
  - deploy

variables:
  DOCKER_IMAGE: unidev-toolkit

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t $DOCKER_IMAGE .
  only:
    - main
    - master
    - merge_requests

deploy-hf:
  stage: deploy
  image: python:3.11-slim
  script:
    - |
      if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE"]; then
        echo "HF_TOKEN or HF_SPACE not set skipping deploy"
        exit 0
      fi
    - pip install huggingface_hub
    - |
      python -c "
      from huggingface_hub import HfApi
      api = HfApi(token='$HF_TOKEN')
      api.upload_folder(
          folder_path='.',
          repo_id='$HF_SPACE',
          repo_type='space',
          ignore_patterns=['node_modules', '.git', 'frontend/node_modules', '__pycache__'],
      )
      print('Deployed to Hugging Face Space')
      "
  only:
    - main
    - master
